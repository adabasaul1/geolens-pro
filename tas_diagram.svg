<?xml version="1.0" encoding="UTF-8"?>
<!--
  GeoLens Pro — Diagrama TAS (Total Alkali-Silica)
  Clasificación de rocas volcánicas según Le Bas et al. (1986)
  revisado en Le Maitre et al. (2002) — IUGS Standard
  
  Referencia: Le Bas, M.J., Le Maitre, R.W., Streckeisen, A., Zanettin, B. (1986)
  A chemical classification of volcanic rocks based on total alkali-silica content.
  Journal of Petrology 27(3):745–750. DOI:10.1093/petrology/27.3.745
  
  Campos de las rocas volcánicas ecuatorianas más frecuentes marcados con ★
  Escala: SiO₂ (X): 37–77 wt%; Na₂O+K₂O (Y): 0–16 wt%
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 520 420"
     width="520" height="420"
     font-family="'JetBrains Mono', 'Courier New', monospace"
     font-size="10">

  <defs>
    <!-- Degradado de fondo oscuro para dark mode -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    
    <!-- Degradado para campos destacados (rocas ecuatorianas) -->
    <linearGradient id="andGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2d4a6b" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1a5276" stop-opacity="0.35"/>
    </linearGradient>
    
    <linearGradient id="basGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a1a6b" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#6c3483" stop-opacity="0.25"/>
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1f2937" stroke-width="0.5"/>
    </pattern>
    
    <!-- Marker flecha -->
    <marker id="arr" viewBox="0 0 8 8" refX="6" refY="4"
            markerWidth="5" markerHeight="5" orient="auto">
      <path d="M1 1L7 4L1 7" fill="none" stroke="#4b5563" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- ── Fondo ──────────────────────────────────────────────────────────── -->
  <rect width="520" height="420" fill="url(#bgGrad)" rx="4"/>
  
  <!-- ── Área de plot: X[60,480] Y[30,360] → SiO₂[37,77] Alk[0,16] ───── -->
  <!-- Transformación: px = 60 + (SiO2-37)×(420/40), py = 360 - (alk)×(330/16) -->
  <rect x="60" y="30" width="420" height="330" fill="url(#grid)"/>
  <rect x="60" y="30" width="420" height="330" fill="none" stroke="#374151" stroke-width="1"/>

  <!-- ── Líneas de campo TAS (polígonos Le Bas 1986) ──────────────────── -->
  <!-- Basalto/Picrobasalto límite: SiO₂=45, Alk=0→0.5 -->
  <!-- Coordenadas en píxeles usando transform: x=60+(sio2-37)*10.5, y=360-alk*20.625 -->
  
  <!-- Límite entre campos: polilíneas según Le Bas et al. 1986 -->
  <!-- Isovolcánica (línea de Macdonald-Katsura) -->
  <polyline 
    points="165,360 165,316 185,296 221,276 252,255 294,234 336,213 420,192"
    fill="none" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Líneas verticales de campo -->
  <!-- SiO2=45 (x=143) -->
  <line x1="83" y1="360" x2="83" y2="340" stroke="#374151" stroke-width="1"/>
  <!-- SiO2=52 (x=218) -->
  <line x1="158" y1="360" x2="158" y2="310" stroke="#374151" stroke-width="1"/>
  <!-- SiO2=57 (x=273) -->
  <line x1="210" y1="360" x2="210" y2="285" stroke="#374151" stroke-width="1"/>
  <!-- SiO2=63 (x=336) -->
  <line x1="273" y1="360" x2="273" y2="255" stroke="#374151" stroke-width="1"/>
  <!-- SiO2=69 (x=399) -->
  <line x1="336" y1="360" x2="336" y2="234" stroke="#374151" stroke-width="1"/>

  <!-- ── CAMPOS COLOREADOS (rocas ecuatorianas frecuentes) ─────────────── -->
  
  <!-- BASALTO (45–52 SiO₂, 0–5 alk en la serie) — campo ★ -->
  <polygon 
    points="83,360 158,360 158,305 128,290 100,295 83,340"
    fill="url(#basGrad)" stroke="#7b3ab7" stroke-width="0.8" stroke-dasharray="none"/>
  
  <!-- ANDESITA BASÁLTICA (52–57 SiO₂) — campo ★ -->
  <polygon
    points="158,360 210,360 210,285 185,280 158,305"
    fill="#1a3d5c" fill-opacity="0.45" stroke="#2874a6" stroke-width="0.8"/>

  <!-- ANDESITA (57–63 SiO₂) — campo ★ ECUADOR (Cotopaxi, Tungurahua) -->
  <polygon
    points="210,360 273,360 273,255 250,248 220,258 210,285"
    fill="url(#andGrad)" stroke="#1a5276" stroke-width="1.2"/>
  
  <!-- DACITA (63–68.5 SiO₂) — campo ★ -->
  <polygon
    points="273,360 325,360 325,240 295,235 273,255"
    fill="#1c4f1e" fill-opacity="0.45" stroke="#1e8449" stroke-width="0.8"/>

  <!-- RIOLITA/TRAQUITA (>69 SiO₂) — Chalcana -->
  <polygon
    points="336,360 480,360 480,180 420,170 390,180 336,234"
    fill="#4a2000" fill-opacity="0.35" stroke="#c0392b" stroke-width="0.8"/>

  <!-- ── ETIQUETAS DE CAMPO ─────────────────────────────────────────────── -->
  <text x="95"  y="345" fill="#a78bfa" font-size="8.5" font-weight="600">Picro</text>
  <text x="95"  y="355" fill="#a78bfa" font-size="8.5" font-weight="600">basalto</text>
  
  <text x="100" y="295" fill="#9b59b6" font-size="9" font-weight="600">Basalto</text>
  <text x="100" y="307" fill="#9b59b6" font-size="8">★ Piñón/VTu</text>
  
  <text x="162" y="320" fill="#5dade2" font-size="9" font-weight="600">And.</text>
  <text x="162" y="332" fill="#5dade2" font-size="8">Basáltica</text>
  
  <text x="213" y="310" fill="#2e86c1" font-size="9" font-weight="600">Andesita</text>
  <text x="213" y="323" fill="#2e86c1" font-size="8">★ VCo/VTu</text>
  <text x="213" y="334" fill="#2e86c1" font-size="8">Macuchi</text>
  
  <text x="276" y="320" fill="#27ae60" font-size="9" font-weight="600">Dacita</text>
  <text x="276" y="332" fill="#27ae60" font-size="8">★ Cotopaxi</text>
  
  <text x="345" y="325" fill="#e74c3c" font-size="9" font-weight="600">Traqui-</text>
  <text x="345" y="337" fill="#e74c3c" font-size="9" font-weight="600">dacita</text>
  
  <text x="390" y="300" fill="#e67e22" font-size="9" font-weight="600">Riolita</text>
  <text x="390" y="312" fill="#e67e22" font-size="8">★ Chalcana</text>

  <!-- Campos alcalinos superiores -->
  <text x="80"  y="100" fill="#f39c12" font-size="8.5" font-weight="600">Tefrita/</text>
  <text x="80"  y="112" fill="#f39c12" font-size="8.5" font-weight="600">Basanita</text>
  <text x="160" y="130" fill="#e67e22" font-size="8.5">Traqi-andesita</text>
  <text x="250" y="140" fill="#d35400" font-size="8.5">Traquita</text>
  <text x="350" y="140" fill="#c0392b" font-size="8.5">Fonolita</text>

  <!-- ── EJES ──────────────────────────────────────────────────────────── -->
  <!-- Eje X (SiO₂) -->
  <line x1="60" y1="360" x2="483" y2="360" stroke="#6b7280" stroke-width="1.2"
        marker-end="url(#arr)"/>
  <!-- Eje Y (Na₂O+K₂O) -->
  <line x1="60" y1="360" x2="60" y2="27" stroke="#6b7280" stroke-width="1.2"
        marker-end="url(#arr)"/>

  <!-- Ticks eje X: SiO₂ cada 5% wt -->
  <g fill="#9ca3af" font-size="9" text-anchor="middle">
    <text x="83"  y="373">37</text>
    <text x="135" y="373">42</text>
    <text x="188" y="373">47</text>
    <text x="240" y="373">52</text>
    <text x="293" y="373">57</text>
    <text x="345" y="373">62</text>
    <text x="398" y="373">67</text>
    <text x="450" y="373">72</text>
    <text x="480" y="373">77</text>
  </g>
  <!-- Líneas de tick X -->
  <g stroke="#4b5563" stroke-width="0.7">
    <line x1="83"  y1="358" x2="83"  y2="364"/>
    <line x1="135" y1="358" x2="135" y2="364"/>
    <line x1="188" y1="358" x2="188" y2="364"/>
    <line x1="240" y1="358" x2="240" y2="364"/>
    <line x1="293" y1="358" x2="293" y2="364"/>
    <line x1="345" y1="358" x2="345" y2="364"/>
    <line x1="398" y1="358" x2="398" y2="364"/>
    <line x1="450" y1="358" x2="450" y2="364"/>
  </g>

  <!-- Ticks eje Y: Na₂O+K₂O cada 2% wt -->
  <g fill="#9ca3af" font-size="9" text-anchor="end">
    <text x="56" y="363">0</text>
    <text x="56" y="322">2</text>
    <text x="56" y="281">4</text>
    <text x="56" y="240">6</text>
    <text x="56" y="199">8</text>
    <text x="56" y="158">10</text>
    <text x="56" y="117">12</text>
    <text x="56" y="76">14</text>
    <text x="56" y="35">16</text>
  </g>
  <!-- Líneas de tick Y -->
  <g stroke="#4b5563" stroke-width="0.7">
    <line x1="58" y1="322" x2="62" y2="322"/>
    <line x1="58" y1="281" x2="62" y2="281"/>
    <line x1="58" y1="240" x2="62" y2="240"/>
    <line x1="58" y1="199" x2="62" y2="199"/>
    <line x1="58" y1="158" x2="62" y2="158"/>
    <line x1="58" y1="117" x2="62" y2="117"/>
    <line x1="58" y1="76"  x2="62" y2="76"/>
    <line x1="58" y1="35"  x2="62" y2="35"/>
  </g>

  <!-- Etiquetas ejes -->
  <text x="270" y="395" text-anchor="middle" fill="#d1d5db" font-size="11" font-weight="600">
    SiO₂ (% en peso)
  </text>
  <text x="20" y="195" text-anchor="middle" fill="#d1d5db" font-size="11" font-weight="600"
        transform="rotate(-90, 20, 195)">
    Na₂O + K₂O (% en peso)
  </text>

  <!-- ── TÍTULO ─────────────────────────────────────────────────────────── -->
  <text x="270" y="18" text-anchor="middle" fill="#f9fafb" font-size="12" font-weight="700"
        letter-spacing="0.5">
    Diagrama TAS — Le Bas et al. (1986) / IUGS
  </text>

  <!-- ── PUNTOS MUESTREO EJEMPLO (rocas ecuatorianas típicas) ─────────── -->
  <!-- Basalto Piñón: SiO₂≈49, alk≈1.5 → x=60+(49-37)*10.5=186, y=360-1.5*20.625=329 -->
  <circle cx="186" cy="329" r="5" fill="#9b59b6" stroke="#f8f9fa" stroke-width="1.2" opacity="0.9"/>
  <text x="192" y="327" fill="#a78bfa" font-size="8">Piñón (n=12)</text>

  <!-- Andesita Cotopaxi: SiO₂≈61, alk≈4.5 → x=60+(61-37)*10.5=312, y=360-4.5*20.625=267 -->
  <circle cx="312" cy="267" r="5" fill="#2e86c1" stroke="#f8f9fa" stroke-width="1.2" opacity="0.9"/>
  <text x="318" y="265" fill="#5dade2" font-size="8">Cotopaxi (n=8)</text>

  <!-- Dacita Cotopaxi: SiO₂≈65, alk≈5 → x=60+(65-37)*10.5=354, y=360-5*20.625=257 -->
  <circle cx="354" cy="257" r="4" fill="#27ae60" stroke="#f8f9fa" stroke-width="1.2" opacity="0.9"/>
  <text x="360" y="255" fill="#58d68d" font-size="8">Dacita VCo (n=5)</text>

  <!-- Toba Chalcana: SiO₂≈73, alk≈8 → x=60+(73-37)*10.5=438, y=360-8*20.625=195 -->
  <circle cx="438" cy="195" r="4" fill="#e67e22" stroke="#f8f9fa" stroke-width="1.2" opacity="0.9"/>
  <text x="420" y="190" fill="#f0b27a" font-size="8">Chalcana (n=4)</text>

  <!-- ── LEYENDA ─────────────────────────────────────────────────────────── -->
  <rect x="62" y="32" width="145" height="55" fill="#111827" fill-opacity="0.85"
        stroke="#374151" stroke-width="0.5" rx="3"/>
  <circle cx="75" cy="45" r="4" fill="#9b59b6"/>
  <text x="83" y="48" fill="#d1d5db" font-size="8">Basalto (Piñón/VTu) ★</text>
  <circle cx="75" cy="60" r="4" fill="#2e86c1"/>
  <text x="83" y="63" fill="#d1d5db" font-size="8">Andesita (Cotopaxi/Macuchi) ★</text>
  <circle cx="75" cy="75" r="4" fill="#27ae60"/>
  <text x="83" y="78" fill="#d1d5db" font-size="8">Dacita/Riolita (VCo/Chalcana) ★</text>

  <!-- Nota metodológica -->
  <text x="62" y="408" fill="#6b7280" font-size="7.5">
    GeoLens Pro v1.0 — Le Bas et al. (1986) J.Petrol. 27:745 — IIGE Ecuador
  </text>
</svg>
